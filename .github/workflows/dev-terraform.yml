name: Dev Environment Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'
      - '.github/workflows/dev-terraform.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: terraform/environments/dev

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: dev-approval
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          export ARM_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"
          export ARM_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          terraform plan -out=tfplan -no-color | tee plan_output.txt
          
          # Check if there are changes
          if grep -q "No changes" plan_output.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No infrastructure changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📋 Infrastructure changes detected"
          fi
        working-directory: ${{ env.WORKING_DIR }}

      - name: Show Plan
        run: |
          echo "## Terraform Plan Output"
          cat plan_output.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && steps.plan.outputs.has_changes == 'true'
        run: |
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          export ARM_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"
          export ARM_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply (Force if no changes)
        if: github.ref == 'refs/heads/main' && steps.plan.outputs.has_changes == 'false'
        run: |
          export ARM_USE_OIDC=true
          export ARM_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          export ARM_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"
          export ARM_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          echo "⚠️ No changes detected, but applying anyway to ensure state is current"
          terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Output
        if: always()
        run: |
          echo "## Terraform Outputs"
          terraform output -json || echo "No outputs available"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.plan.outputs.has_changes }}" == "true" ]; then
            echo "✅ Infrastructure changes applied successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No infrastructure changes detected" >> $GITHUB_STEP_SUMMARY
          fi
