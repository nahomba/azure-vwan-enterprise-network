name: Prod Environment Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/environments/prod/**'
      - 'terraform/modules/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: prod-deployment
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "terraform/environments/prod"

jobs:

# =========================
# VALIDATION
# =========================
  validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -check -recursive

      - working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate


# =========================
# SECURITY
# =========================
  security:
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          soft_fail: false


# =========================
# PLAN
# =========================
  plan:
    runs-on: ubuntu-latest
    needs: [validation, security]
    environment: prod-plan

    steps:
      - uses: actions/checkout@v4

      # 🔍 DEBUG (REMOVE AFTER FIX)
      - name: Debug Azure Client ID
        run: echo "CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -compact-warnings \
            -input=false \
            -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}/tfplan


# =========================
# APPROVAL
# =========================
  approval:
    runs-on: ubuntu-latest
    needs: plan
    environment: prod-approval

    steps:
      - run: echo "Waiting for approval..."


# =========================
# APPLY
# =========================
  apply:
    runs-on: ubuntu-latest
    needs: [plan, approval]
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output -json