name: Prod Environment Deployment

on:
  push:
    branches:
      - main
    paths:
      # Trigger only when prod or modules change
      - 'terraform/environments/prod/**'
      - 'terraform/modules/**'
      - '.github/workflows/**'
  workflow_dispatch:   # Allow manual trigger

# Prevent multiple prod deployments at the same time
concurrency:
  group: prod-deployment
  cancel-in-progress: false

permissions:
  id-token: write   # Required for Azure OIDC login (no secrets needed)
  contents: read
  security-events: write

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: "terraform/environments/prod"

jobs:

# =========================
# VALIDATION
# =========================
  validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - uses: actions/checkout@v4

      # Install Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Ensure Terraform code is properly formatted
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Initialize Terraform (no backend needed here)
      - name: Terraform Init (No Backend)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      # Validate Terraform configuration
      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate


# =========================
# SECURITY SCAN
# =========================
  security:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: validation

    steps:
      - uses: actions/checkout@v4

      # Run static security analysis on Terraform code
      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          soft_fail: false   # Fail pipeline on security issues (strict for prod)


# =========================
# TERRAFORM PLAN
# =========================
  plan:
    name: Terraform Plan (Prod)
    runs-on: ubuntu-latest
    needs: [validation, security]

    # Protected environment (can have approval rules)
    environment: prod-plan

    # Output used to control downstream jobs
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      # Login to Azure using OIDC (no client secret needed)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Install Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Initialize Terraform with remote backend (Azure Storage)
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      # Run Terraform Plan and capture exit code
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          # Default exit code
          export exitcode=0

          # Run plan with detailed exit code
          terraform plan \
            -var-file="terraform.tfvars" \
            -compact-warnings \
            -input=false \
            -lock-timeout=5m \
            -detailed-exitcode \
            -out=tfplan \
            || export exitcode=$?

          # Save exit code for later jobs
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          # Exit if Terraform failed
          if [ $exitcode -eq 1 ]; then
            echo "Plan failed"
            exit 1
          fi

      # Upload plan file for apply stage
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}/tfplan


# =========================
# MANUAL APPROVAL
# =========================
  approval:
    name: Manual Approval (Prod)
    runs-on: ubuntu-latest
    needs: plan

    # Only run if there are changes (exit code 2)
    if: needs.plan.outputs.exitcode == '2'

    # Protected environment → triggers approval gate
    environment: prod-approval

    steps:
      - run: echo "Waiting for production approval..."


# =========================
# APPLY
# =========================
  apply:
    name: Terraform Apply (Prod)
    runs-on: ubuntu-latest
    needs: [plan, approval]

    # Only run if changes exist
    if: needs.plan.outputs.exitcode == '2'

    # Strongest protection (final prod environment)
    environment: prod

    steps:
      - uses: actions/checkout@v4

      # Azure login again (jobs are isolated)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Install Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Re-initialize backend
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      # Download previously generated plan
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.WORKING_DIR }}

      # Apply Terraform plan (exact execution of approved plan)
      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve tfplan

      # Output Terraform results (useful for debugging or integrations)
      - name: Terraform Output
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output -json